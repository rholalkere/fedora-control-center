version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fcc-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=supersecretkey_change_me_in_production
      - SQLALCHEMY_DATABASE_URI=sqlite:///./fedora_control_center.db
      - OLLAMA_API_URL=http://host.docker.internal:11434  # Allows reaching host Ollama
      - BACKEND_CORS_ORIGINS=http://localhost,http://localhost:5173
    volumes:
      - fcc-db-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fcc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fcc-db-data:
